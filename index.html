<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World Cup AI PRO — V2</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <span class="eyebrow">Sprint 1 livré · V2</span>
        <h1>World Cup AI PRO</h1>
        <p>L’assistant MPP qui trie les vrais picks, les value bets et les matchs à éviter.</p>
      </div>
      <div class="hero-card">
        <span>Meilleur pick actuel</span>
        <strong id="heroPick">—</strong>
        <small id="heroMeta">Chargement...</small>
        <button onclick="copyAll()">Copier les pronos MPP</button>
      </div>
    </section>

    <section class="controls">
      <input id="search" placeholder="Recherche : France, Argentine, Espagne..." oninput="render()"/>
      <select id="mode" onchange="render()">
        <option value="balanced">Équilibré</option>
        <option value="safe">Safe</option>
        <option value="comeback">Remontada</option>
      </select>
      <select id="filter" onchange="render()">
        <option value="all">Tous</option>
        <option value="recommended">Recommandés</option>
        <option value="safe">Safe</option>
        <option value="value">Value</option>
        <option value="avoid">À éviter / attendre</option>
      </select>
    </section>

    <section class="kpis">
      <div><b id="kpiAnalyzed">—</b><span>Matchs analysés</span></div>
      <div><b id="kpiRecommended">—</b><span>À jouer</span></div>
      <div><b id="kpiSafe">—</b><span>Safe</span></div>
      <div><b id="kpiAvoid">—</b><span>À éviter</span></div>
    </section>

    <section class="dashboard">
      <div class="main">
        <div id="cards" class="cards"></div>
      </div>

      <aside>
        <div class="panel">
          <h2>Top 5 MPP</h2>
          <div id="topList"></div>
        </div>

        <div class="panel">
          <h2>Stratégie active</h2>
          <p id="strategyText"></p>
        </div>

        <div class="panel">
          <h2>Matchs à éviter</h2>
          <div id="avoidList"></div>
        </div>
      </aside>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
